name: CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: True

jobs:
    test:
        name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

        steps:
        - uses: actions/checkout@v6

        - name: Create short temp directory (Windows only)
          if: runner.os == 'Windows'
          run: mkdir C:\tmp
          shell: cmd

        - name: Set environment variables (Windows only)
          if: runner.os == 'Windows'
          run: |
            echo "TMP=C:\tmp" >> $env:GITHUB_ENV
            echo "TEMP=C:\tmp" >> $env:GITHUB_ENV
          shell: pwsh

        - name: Install system dependencies on macOS
          if: runner.os == 'macOS'
          run: |
            brew install ffmpeg

        - name: Install system dependencies on Ubuntu
          if: runner.os == 'Linux'
          run: |
            sudo apt-get update
            sudo apt-get install -y ffmpeg

        - name: Install FFmpeg on Windows
          if: runner.os == 'Windows'
          uses: FedericoCarboni/setup-ffmpeg@v3
          id: setup-ffmpeg

        - name: Upgrade pip
          run: |
            python -m pip install --upgrade pip

        - name: Install ambiviz
          shell: bash -l {0}
          run: python -m pip install --upgrade-strategy only-if-needed -e .[tests]
          continue-on-error: false

        - name: Test basic import
          run: |
            python -c "import musicalgestures; print('MGT-python import successful on ${{ matrix.os }} Python ${{ matrix.python-version }}')"
